name: Semgrep

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '10 2 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep scan
        run: semgrep scan --config p/owasp-top-ten --config p/javascript --sarif --output semgrep.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
