name: Dependency Audit

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '20 4 * * 1'

permissions:
  contents: read

jobs:
  npm-audit-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  npm-audit-peer-map:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/peer-map
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/peer-map/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  npm-audit-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
