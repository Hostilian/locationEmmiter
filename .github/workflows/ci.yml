name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run verify:decode

  peer-map:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/peer-map
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/peer-map/package-lock.json
      - run: npm ci
      - run: npm run build
