; Default: no RadioLib (builds everywhere). LoRa envs add jgromes/RadioLib.
; Board presets: T-Beam SX1276/SX1262, Heltec V2/V3 — docs/BOARDS.md
; Receiver: LEP_RECEIVER=1 | GPS beacon: LEP_GPS_BEACON=1 (T-Beam + onboard GNSS only, docs/GPS_BEACON.md)
; Regions: LORA_REGION=0 (EU868), 1 (US915), 2 (AU915), 3 (JP920)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -D LEP_HAS_LORA=0 -D LORA_REGION=0
build_src_filter = +<*> -<lora_radiolib.cpp>

[env:esp32dev_lora]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -D LEP_HAS_LORA=1
build_src_filter = +<*> -<lora_stub.cpp>
lib_deps = jgromes/RadioLib @ ^7.1.2

[env:esp32dev_lora_rx]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -D LEP_HAS_LORA=1 -D LEP_RECEIVER=1
build_src_filter = +<*> -<lora_stub.cpp>
lib_deps = jgromes/RadioLib @ ^7.1.2

